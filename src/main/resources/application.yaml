spring:
  application:
    name: spring-boot-data-rest-app

  datasource:
    url: jdbc:postgresql://localhost:5432/Dev
    username: postgres
    password: root
    driver-class-name: org.postgresql.Driver
    hikari:
      auto-commit: false

  jpa:
    hibernate:
      ddl-auto: create   # options: none, validate, update, create, create-drop
    show-sql: true

